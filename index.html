<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Budget Tracker</title>
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --primary: #3b82f6;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --danger: #e11d48; 
            --success: #059669; 
            --border: #e2e8f0;
            --keypad-bg: #f1f5f9;
        }
        
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); margin: 0; padding: 15px; padding-bottom: 90px; }
        .container { max-width: 400px; margin: 0 auto; }
        
        .card { background: var(--surface); padding: 24px 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 20px; }
        h1, h2, h3 { margin-top: 0; }
        
        .header-main { background: var(--surface); padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 20px; cursor: pointer; transition: background 0.2s;}
        .header-main:active { background: #f1f5f9; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-top h2 { margin: 0; font-size: 22px; font-weight: 800; display: flex; align-items: center; gap: 8px;}
        .header-top .total-budget { font-size: 18px; color: var(--text-main); font-weight: 700; }
        .header-arrow { font-size: 12px; color: var(--text-muted); transition: transform 0.3s; }
        
        .month-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border); font-size: 14px; color: var(--text-muted); }
        .month-details-row { display: flex; justify-content: space-between; margin-bottom: 6px; }

        input, button { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; }
        button { background: var(--text-main); color: white; border: none; font-weight: 600; cursor: pointer; }
        .calc-input { background-color: #f8fafc; cursor: pointer; caret-color: transparent; font-weight: 500; color: var(--text-main);}

        .red { color: var(--danger); }
        .green { color: var(--success); }
        .muted { color: var(--text-muted); font-size: 14px; }
        
        .expense-list { list-style: none; padding: 0; margin: 0; }
        /* Adjusted padding to sit perfectly inside the new Day Blocks */
        .expense-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed #cbd5e1; cursor: pointer; }
        .expense-item:last-child { border-bottom: none; padding-bottom: 0; }
        
        /* THE NEW "INSET BLOCK" DAY DESIGN */
        .day-group { 
            background: #f8fafc; /* Soft gray background */
            border: 1px solid var(--border); 
            border-radius: 16px; 
            padding: 16px; 
            margin: 0 16px 16px 16px; 
        }
        .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .day-date { 
            font-size: 12px; 
            font-weight: 800; 
            color: #475569; 
            text-transform: uppercase; 
            background: #ffffff; /* Crisp white badge */
            border: 1px solid var(--border);
            padding: 6px 10px; 
            border-radius: 8px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .day-meta { font-size: 15px; font-weight: 700; }
        .day-meta .limit { color: var(--text-muted); font-weight: 500; font-size: 13px; margin-left: 2px; }
        
        .week-card { margin-bottom: 12px; border: 1px solid var(--border); border-radius: 16px; overflow: hidden; background: var(--surface); box-shadow: 0 2px 8px rgba(0,0,0,0.02);}
        .week-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; cursor: pointer; }
        .week-title { margin: 0; font-size: 15px; font-weight: 700; color: var(--text-muted); }
        .week-remaining { font-size: 18px; font-weight: 700; }
        
        .week-summary { background: var(--bg); border-radius: 8px; padding: 12px 16px; margin: 0 16px 20px 16px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;}
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 10px 25px 10px; border-top: 1px solid var(--border); z-index: 10; max-width: 400px; margin: 0 auto; }
        .nav-btn { background: none; color: var(--text-muted); border: none; font-size: 13px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-btn.active { color: var(--primary); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.6); z-index: 20; justify-content: center; align-items: center; padding: 15px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--surface); width: 100%; max-width: 340px; border-radius: 20px; padding: 24px; }

        .keypad-container { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--keypad-bg); z-index: 30; padding: 15px 15px calc(15px + env(safe-area-inset-bottom)) 15px; max-width: 400px; margin: 0 auto; border-top-left-radius: 24px; border-top-right-radius: 24px; }
        .keypad-container.active { display: block; }
        .keypad-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: white; padding: 12px 20px; border-radius: 12px; font-size: 24px; font-weight: 700; min-height: 56px; color: var(--text-main); }
        .keypad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .keypad-btn { background: white; border: 1px solid var(--border); border-radius: 12px; font-size: 22px; padding: 16px 0; font-weight: 700; color: var(--text-main); cursor: pointer; }
        .keypad-btn:active { background: #e2e8f0; }
        .keypad-btn.op { background: #e0f2fe; color: var(--primary); }
        .keypad-btn.action { background: var(--primary); color: white; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-home" class="view" style="display:block;">
        <div class="header-main" onclick="toggleMonthDetails()">
            <div class="header-top">
                <h2>Overview <span id="monthArrow" class="header-arrow">&#9660;</span></h2>
                <div class="total-budget">Left: <span id="monthlyBudgetDisplayMain" class="green">₹0</span></div>
            </div>
            <div id="monthDetails" class="month-details">
                <div class="month-details-row"><span>Monthly Budget:</span><span id="detailBudget" style="color:var(--text-main); font-weight:600;">₹0</span></div>
                <div class="month-details-row"><span>Total Spent:</span><span id="detailSpent" style="color:var(--text-main); font-weight:600;">₹0</span></div>
            </div>
        </div>

        <div id="monthContainer"></div>
    </div>

    <div id="view-add" class="view" style="display:none;">
        <div class="card">
            <h2>Add Expense</h2>
            <input type="text" id="expenseName" placeholder="Item Name">
            <input type="text" id="expenseAmount" class="calc-input" readonly placeholder="Amount" onclick="openKeypad('expenseAmount')">
            <input type="date" id="expenseDate">
            <button onclick="addExpense()" style="background: var(--primary);">Save</button>
        </div>
    </div>

    <div id="view-settings" class="view" style="display:none;">
        <div class="card">
            <h2>Setup</h2>
            <label style="font-size:14px; font-weight:600;">Monthly Budget</label>
            <input type="text" id="monthlyBudgetInput" class="calc-input" readonly onclick="openKeypad('monthlyBudgetInput')">
            <button onclick="saveBudget()">Save</button>
            <button onclick="clearAllData()" style="background: var(--danger); margin-top:20px;">Reset All Data</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('view-home', this)"><span>📊</span> Home</button>
    <button class="nav-btn" onclick="switchTab('view-add', this)"><span>➕</span> Add</button>
    <button class="nav-btn" onclick="switchTab('view-settings', this)"><span>⚙️</span> Setup</button>
</nav>

<div id="editModal" class="modal-overlay">
    <div class="modal-content">
        <h2>Edit Expense</h2>
        <input type="hidden" id="editId">
        <input type="text" id="editName">
        <input type="text" id="editAmount" class="calc-input" readonly onclick="openKeypad('editAmount')">
        <input type="date" id="editDate">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="saveEdit()" style="background:var(--success);">Update</button>
            <button onclick="deleteExpense()" style="background:var(--danger);">Delete</button>
        </div>
        <button onclick="closeEditModal()" style="background:none; color:black; margin-top:10px; border:none;">Cancel</button>
    </div>
</div>

<div id="keypad" class="keypad-container">
    <div class="keypad-header"><span id="keypadDisplay"></span><button class="keypad-btn action" style="width:auto; padding:5px 15px; font-size:14px;" onclick="closeKeypad()">Done</button></div>
    <div class="keypad-grid">
        <button class="keypad-btn" onclick="kp('7')">7</button><button class="keypad-btn" onclick="kp('8')">8</button><button class="keypad-btn" onclick="kp('9')">9</button><button class="keypad-btn op" onclick="kp('/')">÷</button>
        <button class="keypad-btn" onclick="kp('4')">4</button><button class="keypad-btn" onclick="kp('5')">5</button><button class="keypad-btn" onclick="kp('6')">6</button><button class="keypad-btn op" onclick="kp('*')">×</button>
        <button class="keypad-btn" onclick="kp('1')">1</button><button class="keypad-btn" onclick="kp('2')">2</button><button class="keypad-btn" onclick="kp('3')">3</button><button class="keypad-btn op" onclick="kp('-')">−</button>
        <button class="keypad-btn op" onclick="kp('C')">C</button><button class="keypad-btn" onclick="kp('0')">0</button><button class="keypad-btn" onclick="kp('.')">.</button><button class="keypad-btn op" onclick="kp('+')">+</button>
        <button class="keypad-btn op" style="grid-column: span 2;" onclick="kp('del')">⌫</button><button class="keypad-btn action" style="grid-column: span 2;" onclick="kp('=')">=</button>
    </div>
</div>

<script>
    let monthlyBudget = parseFloat(localStorage.getItem('monthlyBudget')) || 0;
    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
    document.getElementById('expenseDate').valueAsDate = new Date();

    let activeInputId = null;
    function openKeypad(id) { 
        activeInputId = id; 
        document.getElementById('keypadDisplay').innerText = document.getElementById(id).value; 
        document.getElementById('keypad').classList.add('active'); 
    }
    function closeKeypad() { kp('='); document.getElementById('keypad').classList.remove('active'); activeInputId = null; }
    function kp(v) {
        const d = document.getElementById('keypadDisplay');
        if (v === 'C') d.innerText = '';
        else if (v === 'del') d.innerText = d.innerText.slice(0, -1);
        else if (v === '=') { try { d.innerText = eval(d.innerText.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-')) || ''; } catch(e){} }
        else d.innerText += (v==='*')?'×':(v==='/')?'÷':(v==='-')?'−':v;
        if(activeInputId) document.getElementById(activeInputId).value = d.innerText;
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        btn.classList.add('active');
    }

    function toggleMonthDetails() {
        const details = document.getElementById('monthDetails');
        const arrow = document.getElementById('monthArrow');
        if (details.style.display === 'block') {
            details.style.display = 'none';
            arrow.innerHTML = '&#9660;';
        } else {
            details.style.display = 'block';
            arrow.innerHTML = '&#9650;';
        }
    }

    function saveBudget() { 
        monthlyBudget = parseFloat(document.getElementById('monthlyBudgetInput').value) || 0;
        localStorage.setItem('monthlyBudget', monthlyBudget);
        updateUI(); switchTab('view-home', document.querySelector('.nav-btn'));
    }

    function addExpense() {
        kp('='); const n = document.getElementById('expenseName').value, a = parseFloat(document.getElementById('expenseAmount').value), d = document.getElementById('expenseDate').value;
        if(!n || isNaN(a) || !d) return alert("Please fill all fields");
        expenses.push({ id: Date.now(), name: n, amount: a, date: d });
        localStorage.setItem('expenses', JSON.stringify(expenses));
        updateUI(); switchTab('view-home', document.querySelector('.nav-btn'));
    }

    function openEditModal(id) {
        const e = expenses.find(x => x.id === id);
        document.getElementById('editId').value = e.id; document.getElementById('editName').value = e.name; document.getElementById('editAmount').value = e.amount; document.getElementById('editDate').value = e.date;
        document.getElementById('editModal').classList.add('active');
    }
    function closeEditModal() { document.getElementById('editModal').classList.remove('active'); }
    function saveEdit() {
        const id = parseInt(document.getElementById('editId').value);
        const idx = expenses.findIndex(x => x.id === id);
        expenses[idx] = { id, name: document.getElementById('editName').value, amount: parseFloat(document.getElementById('editAmount').value), date: document.getElementById('editDate').value };
        localStorage.setItem('expenses', JSON.stringify(expenses));
        updateUI(); closeEditModal();
    }
    function deleteExpense() {
        expenses = expenses.filter(x => x.id !== parseInt(document.getElementById('editId').value));
        localStorage.setItem('expenses', JSON.stringify(expenses));
        updateUI(); closeEditModal();
    }

    function formatINR(v) { return (v < 0 ? '-' : '') + '₹' + Math.abs(Math.round(v)).toLocaleString('en-IN'); }
    function formatCleanDate(s) { const p = s.split('-'); const m = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']; return `${m[p[1]-1]} ${p[2]}`; }
    function clearAllData() { if(confirm("Reset everything?")) { localStorage.clear(); location.reload(); } }

    function updateUI() {
        const now = new Date();
        const curM = now.getMonth(), curY = now.getFullYear();
        const dayOfMonth = now.getDate();
        const thisMonthExps = expenses.filter(e => {
            const d = new Date(e.date);
            return d.getMonth() === curM && d.getFullYear() === curY;
        });

        const totalSpent = thisMonthExps.reduce((s, e) => s + e.amount, 0);
        const remainingMonth = monthlyBudget - totalSpent;
        
        const mainDisplay = document.getElementById('monthlyBudgetDisplayMain');
        mainDisplay.innerText = formatINR(remainingMonth);
        mainDisplay.className = remainingMonth < 0 ? 'red' : 'green';
        
        document.getElementById('detailBudget').innerText = formatINR(monthlyBudget);
        document.getElementById('detailSpent').innerText = formatINR(totalSpent);

        const baseWeekly = monthlyBudget / 4;
        const curWNum = Math.ceil(dayOfMonth / 7);
        const weeks = {};
        thisMonthExps.forEach(e => {
            const d = new Date(e.date), w = Math.ceil(d.getDate() / 7);
            if (!weeks[w]) weeks[w] = { total: 0, days: {} };
            weeks[w].total += e.amount;
            if (!weeks[w].days[e.date]) weeks[w].days[e.date] = [];
            weeks[w].days[e.date].push(e);
        });

        let totalRollover = 0;
        for (let i = 1; i < curWNum; i++) {
            const spent = weeks[i] ? weeks[i].total : 0;
            totalRollover += (baseWeekly - spent);
        }
        
        const weeksRemaining = (4 - curWNum) + 1; 
        const rolloverPerWeek = totalRollover / weeksRemaining;
        const currentWeekBudget = baseWeekly + rolloverPerWeek;

        const container = document.getElementById('monthContainer');
        container.innerHTML = '';

        for (let w = 4; w >= 1; w--) {
            const weekData = weeks[w];
            if (w !== curWNum && (!weekData || weekData.total === 0)) continue;

            const spent = weekData ? weekData.total : 0;
            const isCurrent = (w === curWNum);
            const budgetForThisWeek = isCurrent ? currentWeekBudget : baseWeekly;
            const remaining = budgetForThisWeek - spent;

            let safeDaily = baseWeekly / 7;

            let html = `
                <div class="week-card">
                    <div class="week-header" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
                        <h3 class="week-title">WEEK ${w}</h3>
                        <div style="text-align: right;">
                            <div class="muted" style="font-size: 11px;">${isCurrent ? 'REMAINING' : 'BALANCE'}</div>
                            <div class="week-remaining ${remaining < 0 ? 'red' : 'green'}">${formatINR(remaining)}</div>
                        </div>
                    </div>
                    <div style="display: ${isCurrent ? 'block' : 'none'}; padding-bottom: 10px;">
            `;

            if (isCurrent) {
                const dayOfW = dayOfMonth - (w-1)*7;
                const daysLeftInW = Math.max(1, (7 - dayOfW) + 1);
                safeDaily = Math.max(0, remaining / daysLeftInW); 
                
                html += `
                <div class="week-summary">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span style="font-weight:700; color:var(--text-main); font-size:16px;">${formatINR(baseWeekly)}</span>
                        <span class="${rolloverPerWeek >= 0 ? 'green' : 'red'}" style="font-size:14px; font-weight:700;">
                            ${rolloverPerWeek >= 0 ? '+' : ''}${formatINR(rolloverPerWeek)}
                        </span>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-size:11px; color:var(--text-muted); text-transform:uppercase; font-weight:600;">Safe Daily</div>
                        <div style="font-weight:800; color:var(--success); font-size:16px;">${formatINR(safeDaily)}</div>
                    </div>
                </div>`;
            }

            const sortedDates = Object.keys(weekData ? weekData.days : {}).sort((a,b) => new Date(b) - new Date(a));
            sortedDates.forEach(date => {
                const dTotal = weekData.days[date].reduce((s, e) => s + e.amount, 0);
                
                const limitToCompare = isCurrent ? safeDaily : (baseWeekly / 7);
                const isOver = dTotal > limitToCompare;

                html += `
                    <div class="day-group">
                        <div class="day-header">
                            <span class="day-date">${formatCleanDate(date)}</span>
                            <span class="day-meta ${isOver ? 'red' : ''}">
                                ${formatINR(dTotal)} 
                                <span class="limit">/ ${formatINR(limitToCompare)}</span>
                            </span>
                        </div>
                        <ul class="expense-list">
                `;
                
                weekData.days[date].forEach(exp => {
                    html += `<li class="expense-item" onclick="openEditModal(${exp.id})"><span>${exp.name}</span><span class="muted">${formatINR(exp.amount)}</span></li>`;
                });
                
                html += `</ul></div>`;
            });

            html += `</div></div>`;
            container.innerHTML += html;
        }
    }
    updateUI();
</script>
</body>
</html>
