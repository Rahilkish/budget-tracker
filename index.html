<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Budget Tracker</title>
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --primary: #3b82f6;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --danger: #e11d48; 
            --danger-bg: #fff1f2;
            --success: #059669; 
            --success-bg: #ecfdf5;
            --border: #e2e8f0;
            --keypad-bg: #f1f5f9;
        }
        
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); margin: 0; padding: 15px; padding-bottom: 90px; }
        .container { max-width: 400px; margin: 0 auto; }
        
        .card { background: var(--surface); padding: 24px 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 20px; }
        h1, h2, h3 { margin-top: 0; }
        
        input, button { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; transition: all 0.2s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        button { background: var(--text-main); color: white; border: none; font-weight: 600; cursor: pointer; }
        button:active { transform: scale(0.98); }
        
        .calc-input { background-color: #f8fafc; cursor: pointer; caret-color: transparent; font-weight: 500;}

        .header-main { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);}
        .header-main h2 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.5px;}
        .header-main .total-budget { font-size: 18px; color: var(--text-muted); font-weight: 600; }

        .red { color: var(--danger); }
        .green { color: var(--success); }
        .muted { color: var(--text-muted); font-size: 14px; font-weight: 400; }
        
        .expense-list { list-style: none; padding: 0; margin: 0; }
        .expense-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 1px dashed var(--border); cursor: pointer; border-radius: 8px; transition: background 0.2s;}
        .expense-item:last-child { border-bottom: none; }
        .expense-item:active { background-color: #f1f5f9; }
        
        .day-group { margin-top: 20px; padding-top: 5px; }
        .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 16px; }
        .day-date { font-size: 13px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; background: #f1f5f9; padding: 4px 10px; border-radius: 8px; }
        
        .week-card { margin-bottom: 12px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--surface); }
        .week-header { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 16px; cursor: pointer; }
        .week-title { margin: 0; font-size: 15px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.5px; }
        .week-remaining { font-size: 18px; font-weight: 700; }
        
        .week-summary { background: var(--bg); border-radius: 8px; padding: 12px 16px; margin: 12px 16px 20px 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .week-summary-label { color: var(--text-muted); font-size: 14px; font-weight: 500; }
        .week-summary-val { font-size: 16px; font-weight: 700; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 10px 25px 10px; box-shadow: 0 -4px 20px rgba(0,0,0,0.04); max-width: 400px; margin: 0 auto; border-top: 1px solid var(--border); z-index: 10; }
        .nav-btn { background: none; color: var(--text-muted); border: none; padding: 10px; font-size: 13px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-btn.active { color: var(--primary); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 20; justify-content: center; align-items: center; padding: 15px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--surface); width: 100%; max-width: 340px; border-radius: 20px; padding: 24px; }
        .modal-actions { display: flex; gap: 12px; margin-top: 16px; }

        .keypad-container { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--keypad-bg); z-index: 30; padding: 15px 15px calc(15px + env(safe-area-inset-bottom)) 15px; box-shadow: 0 -10px 25px rgba(0,0,0,0.05); max-width: 400px; margin: 0 auto; border-top-left-radius: 24px; border-top-right-radius: 24px; }
        .keypad-container.active { display: block; }
        .keypad-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: white; padding: 12px 20px; border-radius: 12px; font-size: 24px; font-weight: 700; min-height: 56px; }
        .keypad-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .keypad-btn { background: white; border: none; border-radius: 12px; font-size: 22px; padding: 16px 0; font-weight: 500; }
        .keypad-btn.op { background: #e0f2fe; color: var(--primary); font-weight: 600; }
        .keypad-btn.action { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="view-home" class="view active" style="display:block;">
        <div class="card" style="background: transparent; box-shadow: none; padding: 0;">
            <div class="header-main">
                <h2>Overview</h2>
                <div class="total-budget">Month Left: <span id="monthlyBudgetDisplayMain">₹0</span></div>
            </div>
            <div id="monthContainer"></div>
        </div>
    </div>

    <div id="view-add" class="view" style="display:none;">
        <div class="card">
            <h2 style="margin-bottom: 24px;">New Expense</h2>
            <input type="text" id="expenseName" placeholder="Item Name">
            <input type="text" id="expenseAmount" class="calc-input" readonly placeholder="Amount" onclick="openKeypad('expenseAmount')">
            <input type="date" id="expenseDate">
            <button onclick="addExpense()" style="background: var(--primary); margin-top: 10px;">Save Expense</button>
        </div>
    </div>

    <div id="view-settings" class="view" style="display:none;">
        <div class="card">
            <h2 style="margin-bottom: 24px;">Setup Month</h2>
            <label style="display:block; margin-bottom:8px; font-weight:600; font-size:14px;">Total Monthly Budget</label>
            <input type="text" id="monthlyBudgetInput" class="calc-input" readonly placeholder="₹0" onclick="openKeypad('monthlyBudgetInput')">
            <button onclick="saveBudget()" style="margin-top:24px;">Save Budget</button>
            <button onclick="clearAllData()" style="margin-top:10px; background: var(--danger);">Clear All Data</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('view-home', this)"><span>📊</span> Timeline</button>
    <button class="nav-btn" onclick="switchTab('view-add', this)"><span>➕</span> Add</button>
    <button class="nav-btn" onclick="switchTab('view-settings', this)"><span>⚙️</span> Settings</button>
</nav>

<div id="editModal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="margin-top:0;">Edit</h2>
        <input type="hidden" id="editId"><input type="text" id="editName"><input type="text" id="editAmount" class="calc-input" readonly onclick="openKeypad('editAmount')"><input type="date" id="editDate">
        <div class="modal-actions"><button onclick="saveEdit()" style="background:var(--success);">Update</button><button onclick="deleteExpense()" style="background:var(--danger);">Delete</button></div>
        <button onclick="closeEditModal()" style="background:white; color:black; border:1px solid #ddd; margin-top:10px;">Cancel</button>
    </div>
</div>

<div id="keypad" class="keypad-container">
    <div class="keypad-header"><span id="keypadDisplay"></span><button class="keypad-btn action" style="width:auto; padding:6px 16px; font-size:15px;" onclick="closeKeypad()">Done</button></div>
    <div class="keypad-grid">
        <button class="keypad-btn" onclick="kp('7')">7</button><button class="keypad-btn" onclick="kp('8')">8</button><button class="keypad-btn" onclick="kp('9')">9</button><button class="keypad-btn op" onclick="kp('/')">÷</button>
        <button class="keypad-btn" onclick="kp('4')">4</button><button class="keypad-btn" onclick="kp('5')">5</button><button class="keypad-btn" onclick="kp('6')">6</button><button class="keypad-btn op" onclick="kp('*')">×</button>
        <button class="keypad-btn" onclick="kp('1')">1</button><button class="keypad-btn" onclick="kp('2')">2</button><button class="keypad-btn" onclick="kp('3')">3</button><button class="keypad-btn op" onclick="kp('-')">−</button>
        <button class="keypad-btn op" onclick="kp('C')">C</button><button class="keypad-btn" onclick="kp('0')">0</button><button class="keypad-btn" onclick="kp('.')">.</button><button class="keypad-btn op" onclick="kp('+')">+</button>
        <button class="keypad-btn op" style="grid-column: span 2;" onclick="kp('del')">⌫</button><button class="keypad-btn action" style="grid-column: span 2;" onclick="kp('=')">=</button>
    </div>
</div>

<script>
    let monthlyBudget = parseFloat(localStorage.getItem('monthlyBudget')) || 0;
    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
    document.getElementById('expenseDate').valueAsDate = new Date();

    let activeInputId = null;
    function openKeypad(id) { activeInputId = id; document.getElementById('keypadDisplay').innerText = document.getElementById(id).value; document.getElementById('keypad').classList.add('active'); }
    function closeKeypad() { kp('='); document.getElementById('keypad').classList.remove('active'); activeInputId = null; }
    function kp(v) {
        const d = document.getElementById('keypadDisplay');
        if (v === 'C') d.innerText = '';
        else if (v === 'del') d.innerText = d.innerText.slice(0, -1);
        else if (v === '=') { try { d.innerText = eval(d.innerText.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-')) || ''; } catch(e){} }
        else d.innerText += (v==='*')?'×':(v==='/')?'÷':(v==='-')?'−':v;
        if(activeInputId) document.getElementById(activeInputId).value = d.innerText;
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        btn.classList.add('active');
    }

    function saveBudget() { 
        monthlyBudget = parseFloat(document.getElementById('monthlyBudgetInput').value) || 0;
        localStorage.setItem('monthlyBudget', monthlyBudget);
        updateUI(); switchTab('view-home', document.querySelector('.nav-btn'));
    }

    function addExpense() {
        kp('='); const n = document.getElementById('expenseName').value, a = parseFloat(document.getElementById('expenseAmount').value), d = document.getElementById('expenseDate').value;
        if(!n || isNaN(a) || !d) return alert("Fill all");
        expenses.push({ id: Date.now(), name: n, amount: a, date: d });
        localStorage.setItem('expenses', JSON.stringify(expenses));
        updateUI(); switchTab('view-home', document.querySelector('.nav-btn'));
    }

    function openEditModal(id) {
        const e = expenses.find(x => x.id === id);
        document.getElementById('editId').value = e.id; document.getElementById('editName').value = e.name; document.getElementById('editAmount').value = e.amount; document.getElementById('editDate').value = e.date;
        document.getElementById('editModal').classList.add('active');
    }
    function closeEditModal() { document.getElementById('editModal').classList.remove('active'); }
    function saveEdit() {
        const id = parseInt(document.getElementById('editId').value);
        const idx = expenses.findIndex(x => x.id === id);
        expenses[idx] = { id, name: document.getElementById('editName').value, amount: parseFloat(document.getElementById('editAmount').value), date: document.getElementById('editDate').value };
        localStorage.setItem('expenses', JSON.stringify(expenses));
        updateUI(); closeEditModal();
    }
    function deleteExpense() {
        expenses = expenses.filter(x => x.id !== parseInt(document.getElementById('editId').value));
        localStorage.setItem('expenses', JSON.stringify(expenses));
        updateUI(); closeEditModal();
    }

    function formatINR(v) { return (v < 0 ? '-' : '') + '₹' + Math.abs(Math.round(v)).toLocaleString('en-IN'); }
    function formatCleanDate(s) { const p = s.split('-'); const m = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']; return `${m[p[1]-1]} ${p[2]}`; }
    function clearAllData() { if(confirm("Clear all?")) { localStorage.clear(); location.reload(); } }

    function updateUI() {
        const now = new Date();
        const curM = now.getMonth(), curY = now.getFullYear();
        const lastDay = new Date(curY, curM + 1, 0).getDate();
        const dayOfMonth = now.getDate();
        
        const thisMonthExps = expenses.filter(e => {
            const d = new Date(e.date);
            return d.getMonth() === curM && d.getFullYear() === curY;
        });

        const mSpent = thisMonthExps.reduce((s, e) => s + e.amount, 0);
        const mLeft = monthlyBudget - mSpent;
        document.getElementById('monthlyBudgetDisplayMain').innerText = formatINR(mLeft);

        const curW = Math.ceil(dayOfMonth / 7);
        const totalWeeks = Math.ceil(lastDay / 7);
        const weeksLeft = (totalWeeks - curW) + 1; // including current week

        // --- THE ADAPTIVE MATH ---
        // Every future week gets an equal share of what is left for the month
        const adaptiveWeeklyBudget = Math.max(0, mLeft / weeksLeft);
        
        const weeks = {};
        thisMonthExps.forEach(e => {
            const d = new Date(e.date), w = Math.ceil(d.getDate() / 7);
            if (!weeks[w]) weeks[w] = {};
            if (!weeks[w][e.date]) weeks[w][e.date] = [];
            weeks[w][e.date].push(e);
        });

        const monthContainer = document.getElementById('monthContainer');
        monthContainer.innerHTML = '';

        for (let w = totalWeeks; w >= 1; w--) {
            const weekDays = weeks[w] || {};
            if (w !== curW && Object.keys(weekDays).length === 0) continue;

            let wSpent = 0;
            Object.values(weekDays).forEach(list => list.forEach(e => wSpent += e.amount));
            
            // For historical weeks, we show how they performed. 
            // For current week, we show the adaptive remaining budget.
            const wRemaining = (w === curW) ? adaptiveWeeklyBudget - wSpent : (monthlyBudget/totalWeeks) - wSpent;

            let html = `
                <div class="week-card">
                    <div class="week-header" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">
                        <h3 class="week-title">WEEK ${w}</h3>
                        <div style="text-align: right;">
                            <div class="muted" style="font-size: 11px;">${w === curW ? 'REMAINING' : 'RESULT'}</div>
                            <div class="week-remaining ${wRemaining < 0 ? 'red' : 'green'}">${formatINR(wRemaining)}</div>
                        </div>
                    </div>
                    <div style="display: ${w === curW ? 'block' : 'none'}; padding-bottom: 10px;">
            `;

            if (w === curW) {
                const daysInThisWeek = (Math.min(w * 7, lastDay) - (w-1)*7);
                const dayOfThisWeek = dayOfMonth - (w-1)*7;
                const daysLeftInW = (daysInThisWeek - dayOfThisWeek) + 1;
                const safeDaily = Math.max(0, (adaptiveWeeklyBudget - wSpent) / daysLeftInW);
                
                html += `<div class="week-summary"><span class="week-summary-label">Safe per day:</span><span class="week-summary-val green">${formatINR(safeDaily)}</span></div>`;
            }

            const sortedDates = Object.keys(weekDays).sort((a,b) => new Date(b) - new Date(a));
            sortedDates.forEach(date => {
                const dTotal = weekDays[date].reduce((s, e) => s + e.amount, 0);
                html += `<div class="day-group"><div class="day-header"><span class="day-date">${formatCleanDate(date)}</span><span class="day-meta">${formatINR(dTotal)}</span></div><ul class="expense-list">`;
                weekDays[date].forEach(exp => {
                    html += `<li class="expense-item" onclick="openEditModal(${exp.id})"><span>${exp.name}</span><span class="muted">${formatINR(exp.amount)}</span></li>`;
                });
                html += `</ul></div>`;
            });
            html += `</div></div>`;
            monthContainer.innerHTML += html;
        }
    }
    updateUI();
</script>
</body>
</html>
